name: docs-overhaul
version: 1.0.0
description: Drive a documentation overhaul with the imported docs architect capability.
inputs:
  target_dir:
    type: string
    description: Repository or directory to document.
    required: true
outputs:
  result:
    type: object
    description: Documentation plan or output summary.
steps:
  - id: document
    name: Architect the docs suite
    action: invoke-agent
    agent: researcher
    inputs:
      agent_name: researcher
      target_dir: target_dir
      active_skills:
        - workflow-ops/docs-architect
execution:
  mode: dependency-aware
  fail_fast: true
metadata:
  author: agent-33
  tags:
    - capability-pack
    - docs
    - workflow-ops
