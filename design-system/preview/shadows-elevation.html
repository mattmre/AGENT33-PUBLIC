<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="dsp">
  <p class="eyebrow">ELEVATION · NEUMORPHIC SHADOWS</p>
  <div class="dsp-row" style="margin-top:18px;gap:18px;flex-wrap:wrap;">
    <div style="width:170px;height:110px;background:#1a1d21;border-radius:18px;box-shadow:6px 6px 14px rgba(0,0,0,0.45),-6px -6px 14px rgba(255,255,255,0.04);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;"><span class="label">--shadow-outer</span><span class="mono dim" style="font-size:11px;">cards / panels</span></div>
    <div style="width:170px;height:110px;background:#1a1d21;border-radius:18px;box-shadow:4px 4px 8px rgba(0,0,0,0.4),-4px -4px 8px rgba(255,255,255,0.04);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;"><span class="label">--shadow-outer-sm</span><span class="mono dim" style="font-size:11px;">buttons rest</span></div>
    <div style="width:170px;height:110px;background:#1a1d21;border-radius:18px;box-shadow:inset 4px 4px 8px rgba(0,0,0,0.45),inset -4px -4px 8px rgba(255,255,255,0.04);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;"><span class="label">--shadow-inner</span><span class="mono dim" style="font-size:11px;">inputs / press</span></div>
    <div style="width:170px;height:110px;background:#1a1d21;border-radius:18px;box-shadow:inset 6px 6px 12px rgba(0,0,0,0.5),inset -6px -6px 12px rgba(255,255,255,0.03);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;"><span class="label">--shadow-active</span><span class="mono dim" style="font-size:11px;">focus / pressed</span></div>
  </div>
</div></body></html>
