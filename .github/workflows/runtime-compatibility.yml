name: Runtime Compatibility Drift

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  runtime-compatibility:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check runtime compatibility lock
        run: python scripts/check_runtime_compatibility.py --check-upstream
