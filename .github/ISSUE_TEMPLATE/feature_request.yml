name: Feature request
description: Propose a new capability, integration, or enhancement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature.

        Good feature requests start with a **problem**, not a solution. The clearer the problem,
        the more useful the eventual design conversation.

        For open-ended discussions or design ideas, consider using
        [Discussions](https://github.com/mattmre/AGENT33-PUBLIC/discussions) instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the real-world workflow, friction, or gap you are running into. Avoid jumping to an implementation.
      placeholder: |
        "We run AGENT-33 multi-tenant and need to ratchet down the code execution sandbox
        per-tenant — some tenants can run shell commands, others should be Python-only.
        Today the sandbox config is global and we have to spin up separate engine
        instances per security tier, which doubles our infra cost."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution (optional)
      description: If you have an idea, sketch it. If not, leave this blank — describing the problem well is enough.
      placeholder: "Add a per-tenant override block in `SandboxConfig` that the AuthMiddleware resolves and the CodeExecutor honors per request."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: What workarounds exist today? Why are they insufficient?

  - type: dropdown
    id: scope
    attributes:
      label: Where does this belong?
      description: Pick the closest match — this helps with triage.
      options:
        - Agent runtime / agents/
        - Workflow engine / workflows/
        - Skills + Packs ecosystem
        - Tools + Tool governance
        - Memory / RAG / embeddings
        - LLM provider abstraction
        - Code execution sandbox
        - Messaging adapters (Telegram, Discord, Slack, WhatsApp)
        - Observability / tracing / evaluation
        - Autonomy budgets / two-layer review
        - Release automation
        - Knowledge ingestion
        - MCP integration
        - REST API / CLI
        - Deployment (Docker / K8s)
        - Documentation
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Use cases, links to similar features in other tools, performance constraints, anything that helps frame the proposal.
