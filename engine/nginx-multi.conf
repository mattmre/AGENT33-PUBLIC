# Nginx configuration for AGENT-33 multi-replica local testing.
#
# Round-robin upstream across two API instances.  This is NOT a production
# configuration -- it exists only for the multi-replica E2E test harness.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream agent33_api {
        server api-1:8000;
        server api-2:8000;
    }

    server {
        listen 80;

        # Health check for the load balancer itself
        location /lb-health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Proxy all other requests to the API upstream
        location / {
            proxy_pass http://agent33_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / SSE support for workflow streaming
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for streaming connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
