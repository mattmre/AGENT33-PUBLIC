apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent33-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent33-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent33-api
    spec:
      containers:
        - name: api
          image: agent33:replace-with-immutable-tag
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: agent33-api-config
            - secretRef:
                name: agent33-api-secrets
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: agent33-postgres-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent33-postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: agent33-postgres-secrets
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 10
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 18
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
