apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent33-api
  labels:
    app.kubernetes.io/name: agent33-api
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent33-api
  minReplicas: 1
  maxReplicas: 1  # Single-instance guardrail — see horizontal-scaling-architecture.md
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
