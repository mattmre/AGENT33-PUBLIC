apiVersion: v1
kind: ConfigMap
metadata:
  name: agent33-api-config
data:
  API_PORT: "8000"
  API_LOG_LEVEL: "warning"
  ENVIRONMENT: "production"
  CORS_ALLOWED_ORIGINS: ""
  AUTH_BOOTSTRAP_ENABLED: "false"
  AUTH_BOOTSTRAP_ADMIN_USERNAME: "agent33-admin"
  AUTH_BOOTSTRAP_ADMIN_SCOPES: "admin,agents:read,agents:write,agents:invoke,workflows:read,workflows:write,workflows:execute,tools:execute"
  REDIS_URL: "redis://redis:6379/0"
  NATS_URL: "nats://nats:4222"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_DEFAULT_MODEL: "llama3.2:3b"
  SEARXNG_URL: "http://searxng:8080"
  OPENAI_BASE_URL: ""
